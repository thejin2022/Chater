services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: chater_db
      POSTGRES_USER: chater
      POSTGRES_PASSWORD: chater
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chater -d chater_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - static_data:/app/staticfiles

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    depends_on:
      - backend
    ports:
      - "8080:80"
    volumes:
      - static_data:/app/staticfiles:ro

  k6:
    image: grafana/k6:latest
    working_dir: /scripts
    volumes:
      - ./k6:/scripts
    networks:
      - default


volumes:
  db_data:
  static_data:
